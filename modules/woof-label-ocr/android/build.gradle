plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.wooflabelocr'
version = '0.7.10'

android {
  namespace "expo.modules.wooflabelocr"
  defaultConfig {
    versionCode 1
    versionName "0.7.10"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  // Bundled model keeps first-use label recognition available offline.
  implementation 'com.google.mlkit:text-recognition:16.0.1'
}
